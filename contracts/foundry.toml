[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"
]


solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = true

[rpc_endpoints]
og_testnet = "${OG_CHAIN_RPC_TESTNET}"
og_mainnet = "${OG_CHAIN_RPC_MAINNET}"

[etherscan]
og_testnet = { key = "no-key-needed", url = "https://chainscan-galileo.0g.ai" }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
